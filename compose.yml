volumes:
  db_volume:

networks:
  skillfusion_network:
  proxy-network:
    external: true


services:

# Service de base de données PostgreSQL
  db:
    image: postgres:18
    container_name: skillfusion_db
    environment:
      POSTGRES_USER: usersf
      POSTGRES_PASSWORD: usersf
      POSTGRES_DB: usersf
    volumes:
      - ./database/:/docker-entrypoint-initdb.d
      - db_volume:/var/lib/postgresql
    networks:
      - skillfusion_network

# Service de l'API Node.js
  api:
    build:
      context: ./api
# Permet de dire a Docker de s'arreter a l'étape Développement du DockerFile 
      target: production
    container_name: skillfusion_api
    depends_on:
      - db
    env_file:
      - ./api/.env
    expose:
      - "3000"
    networks:
      - skillfusion_network
      - proxy-network

  client:
    build:
      context: ./client
# Permet de dire a Docker de s'arreter a l'étape Développement du DockerFile 
      target: production
      args:
        VITE_API_URL: https://skillfusion.devponcet07.fr

    container_name: skillfusion_client
    expose:
      - "3000"
    depends_on:
      - api
      - db
    env_file:
      - ./client/.env
    networks:
      - skillfusion_network
      - proxy-network
    command: sh -c "node build/index.js"