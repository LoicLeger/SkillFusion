name: Lint & Format (On main push)

on:
  push:
    branches: [main-dev, main]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint with fix
        run: npm run lint -- --fix
        continue-on-error: true

      - name: Run Prettier
        run: npm run format
        continue-on-error: true

      - name: Commit changes if any
        run: |
          git config user.name "SkillFusion Linter Bot"
          git config user.email "linter@skillfusion.dev"
          
          if ! git diff --quiet; then
            echo "📝 Format changes detected, committing..."
            git add -A
            git commit -m "style: auto-format with eslint & prettier [skip ci]"
            git push
          else
            echo "✅ Code already clean!"
          fi